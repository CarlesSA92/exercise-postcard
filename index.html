<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>My Postcard</title>
</head>
<body>
    <div class="postcard">
        <div id="header">
            <h1>My Postcard</h1>
            <img src="https://storage.googleapis.com/breathecode-asset-images/5318bde604cf5c915f94897a71b49ab2523101322ea21cb046db1e67c24fa3be.png" alt="Postcard Logo 4Geeks">
        </div>
        <div id="main">
            <div class="left-panel">
                <p>Look how awesome! This is a postcard that I created using HTML5 and CSS3 during my 4Geeks Academy Course!</p>
                <p>This is so cool, can't wait to start doing more stuff!</p>
            </div>
            <div class="right-panel">
                <input type="text" placeholder="Some Name"></input>
                <input type="text" placeholder="Some Email"></input>
                <input type="text" placeholder="Some Comment"></input>
            </div>
        </div>
        <div id="footer">
            <button>Send My Postcard</button>
        </div>
    </div>
</body>
</html>
